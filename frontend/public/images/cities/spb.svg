<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="60%" stop-color="#2d5f8a"/>
      <stop offset="100%" stop-color="#4a8fc0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5f8a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#8b6f3a"/>
    </linearGradient>
    <linearGradient id="bldg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b87a"/>
      <stop offset="100%" stop-color="#9a7a42"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="150" cy="25" r="1" fill="white" opacity="0.5"/>
  <circle cx="280" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="420" cy="20" r="1" fill="white" opacity="0.4"/>
  <circle cx="560" cy="35" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="680" cy="15" r="1" fill="white" opacity="0.5"/>
  <circle cx="740" cy="50" r="1.5" fill="white" opacity="0.6"/>

  <!-- Moon glow -->
  <circle cx="680" cy="60" r="40" fill="#4a7aaa" opacity="0.3"/>
  <circle cx="680" cy="60" r="22" fill="#e8dcc8" opacity="0.9"/>

  <!-- Aurora borealis hints -->
  <ellipse cx="300" cy="120" rx="250" ry="40" fill="#007a72" opacity="0.08"/>
  <ellipse cx="500" cy="100" rx="200" ry="30" fill="#2a8f8a" opacity="0.06"/>

  <!-- Neva river -->
  <rect x="0" y="330" width="800" height="170" fill="url(#water)" opacity="0.9"/>
  <!-- Water shimmer -->
  <rect x="0" y="330" width="800" height="4" fill="white" opacity="0.1"/>
  <ellipse cx="200" cy="355" rx="80" ry="3" fill="white" opacity="0.12"/>
  <ellipse cx="500" cy="370" rx="120" ry="4" fill="white" opacity="0.1"/>
  <ellipse cx="680" cy="390" rx="70" ry="3" fill="white" opacity="0.08"/>

  <!-- Palace Bridge (Дворцовый мост) -->
  <!-- Bridge deck -->
  <rect x="50" y="318" width="700" height="18" fill="#2a2010" opacity="0.95"/>
  <!-- Bridge arches -->
  <path d="M50 318 Q150 280 250 318" fill="none" stroke="#3a3020" stroke-width="8"/>
  <path d="M250 318 Q350 280 450 318" fill="none" stroke="#3a3020" stroke-width="8"/>
  <path d="M450 318 Q550 280 650 318" fill="none" stroke="#3a3020" stroke-width="8"/>
  <!-- Bridge pillars -->
  <rect x="140" y="288" width="12" height="30" fill="#3a3020"/>
  <rect x="338" y="288" width="12" height="30" fill="#3a3020"/>
  <rect x="538" y="288" width="12" height="30" fill="#3a3020"/>
  <!-- Bridge railings -->
  <rect x="50" y="315" width="700" height="3" fill="#4a4030"/>
  <!-- Streetlights on bridge -->
  <rect x="100" y="295" width="3" height="23" fill="#c8a96e"/>
  <circle cx="101" cy="293" r="5" fill="#ffe88a" opacity="0.9" filter="url(#glow)"/>
  <rect x="200" y="295" width="3" height="23" fill="#c8a96e"/>
  <circle cx="201" cy="293" r="5" fill="#ffe88a" opacity="0.9" filter="url(#glow)"/>
  <rect x="300" y="295" width="3" height="23" fill="#c8a96e"/>
  <circle cx="301" cy="293" r="5" fill="#ffe88a" opacity="0.9" filter="url(#glow)"/>
  <rect x="400" y="295" width="3" height="23" fill="#c8a96e"/>
  <circle cx="401" cy="293" r="5" fill="#ffe88a" opacity="0.9" filter="url(#glow)"/>
  <rect x="500" y="295" width="3" height="23" fill="#c8a96e"/>
  <circle cx="501" cy="293" r="5" fill="#ffe88a" opacity="0.9" filter="url(#glow)"/>
  <rect x="600" y="295" width="3" height="23" fill="#c8a96e"/>
  <circle cx="601" cy="293" r="5" fill="#ffe88a" opacity="0.9" filter="url(#glow)"/>

  <!-- Winter Palace (Hermitage) left -->
  <rect x="0" y="160" width="240" height="160" fill="url(#bldg)"/>
  <!-- Hermitage windows row 1 -->
  <rect x="15" y="175" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <rect x="45" y="175" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <rect x="75" y="175" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <rect x="105" y="175" width="18" height="24" fill="#ffd88a" rx="2" opacity="0.8"/>
  <rect x="135" y="175" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <rect x="165" y="175" width="18" height="24" fill="#ffd88a" rx="2" opacity="0.6"/>
  <rect x="195" y="175" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <!-- Hermitage windows row 2 -->
  <rect x="15" y="215" width="18" height="24" fill="#ffd88a" rx="2" opacity="0.7"/>
  <rect x="45" y="215" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <rect x="75" y="215" width="18" height="24" fill="#ffd88a" rx="2" opacity="0.5"/>
  <rect x="105" y="215" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <rect x="135" y="215" width="18" height="24" fill="#ffd88a" rx="2" opacity="0.8"/>
  <rect x="165" y="215" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <rect x="195" y="215" width="18" height="24" fill="#1a2a3a" rx="2"/>
  <!-- Hermitage decorative frieze -->
  <rect x="0" y="157" width="240" height="8" fill="#d4b87a"/>
  <!-- Hermitage columns -->
  <rect x="20" y="160" width="6" height="140" fill="#e8c88a" opacity="0.4"/>
  <rect x="50" y="160" width="6" height="140" fill="#e8c88a" opacity="0.4"/>
  <rect x="80" y="160" width="6" height="140" fill="#e8c88a" opacity="0.4"/>
  <rect x="110" y="160" width="6" height="140" fill="#e8c88a" opacity="0.4"/>
  <rect x="140" y="160" width="6" height="140" fill="#e8c88a" opacity="0.4"/>
  <rect x="170" y="160" width="6" height="140" fill="#e8c88a" opacity="0.4"/>
  <rect x="200" y="160" width="6" height="140" fill="#e8c88a" opacity="0.4"/>

  <!-- Admiralty spire (center) -->
  <rect x="340" y="200" width="120" height="120" fill="url(#bldg2)"/>
  <!-- Admiralty arch -->
  <path d="M340 260 Q400 230 460 260" fill="#9a7a42"/>
  <!-- Admiralty central tower -->
  <rect x="375" y="150" width="50" height="55" fill="#c8a96e"/>
  <!-- Admiralty spire -->
  <polygon points="400,55 388,155 412,155" fill="#c8b060"/>
  <circle cx="400" cy="55" r="8" fill="#d4c070"/>
  <circle cx="400" cy="52" r="4" fill="#ffe88a" opacity="0.9" filter="url(#glow)"/>
  <!-- Admiralty windows -->
  <rect x="355" y="215" width="14" height="20" fill="#ffd88a" rx="1" opacity="0.7"/>
  <rect x="380" y="215" width="14" height="20" fill="#1a2a3a" rx="1"/>
  <rect x="406" y="215" width="14" height="20" fill="#ffd88a" rx="1" opacity="0.5"/>
  <rect x="432" y="215" width="14" height="20" fill="#1a2a3a" rx="1"/>
  <!-- Admiralty columns -->
  <rect x="345" y="200" width="5" height="120" fill="#d4b87a" opacity="0.5"/>
  <rect x="360" y="200" width="5" height="120" fill="#d4b87a" opacity="0.5"/>
  <rect x="435" y="200" width="5" height="120" fill="#d4b87a" opacity="0.5"/>
  <rect x="450" y="200" width="5" height="120" fill="#d4b87a" opacity="0.5"/>

  <!-- St. Isaac's Cathedral (right side) -->
  <rect x="520" y="170" width="200" height="150" fill="url(#bldg)"/>
  <!-- Isaac columns -->
  <rect x="530" y="170" width="7" height="150" fill="#e8c88a" opacity="0.5"/>
  <rect x="550" y="170" width="7" height="150" fill="#e8c88a" opacity="0.5"/>
  <rect x="570" y="170" width="7" height="150" fill="#e8c88a" opacity="0.5"/>
  <rect x="590" y="170" width="7" height="150" fill="#e8c88a" opacity="0.5"/>
  <rect x="640" y="170" width="7" height="150" fill="#e8c88a" opacity="0.5"/>
  <rect x="660" y="170" width="7" height="150" fill="#e8c88a" opacity="0.5"/>
  <rect x="680" y="170" width="7" height="150" fill="#e8c88a" opacity="0.5"/>
  <rect x="700" y="170" width="7" height="150" fill="#e8c88a" opacity="0.5"/>
  <!-- Isaac dome base -->
  <rect x="570" y="110" width="100" height="65" fill="#b89840"/>
  <!-- Isaac dome -->
  <ellipse cx="620" cy="115" rx="52" ry="30" fill="#c8a840"/>
  <ellipse cx="620" cy="110" rx="42" ry="24" fill="#d4b850"/>
  <!-- Isaac lantern -->
  <rect x="610" y="80" width="20" height="35" fill="#c8a840"/>
  <circle cx="620" cy="78" r="12" fill="#d4b850"/>
  <circle cx="620" cy="75" r="6" fill="#ffe88a" opacity="0.8" filter="url(#glow)"/>
  <!-- Cross -->
  <rect x="618" y="58" width="4" height="18" fill="#d4c060"/>
  <rect x="612" y="64" width="16" height="3" fill="#d4c060"/>
  <!-- Isaac windows -->
  <rect x="535" y="200" width="12" height="18" fill="#ffd88a" rx="1" opacity="0.6"/>
  <rect x="560" y="200" width="12" height="18" fill="#1a2a3a" rx="1"/>
  <rect x="620" y="145" width="12" height="18" fill="#ffd88a" rx="1" opacity="0.7"/>
  <rect x="645" y="200" width="12" height="18" fill="#ffd88a" rx="1" opacity="0.5"/>
  <rect x="670" y="200" width="12" height="18" fill="#1a2a3a" rx="1"/>
  <rect x="695" y="200" width="12" height="18" fill="#ffd88a" rx="1" opacity="0.6"/>

  <!-- Light reflections in water -->
  <rect x="90" y="335" width="4" height="80" fill="#ffe88a" opacity="0.15"/>
  <rect x="195" y="338" width="4" height="70" fill="#ffe88a" opacity="0.12"/>
  <rect x="395" y="340" width="5" height="60" fill="#ffd88a" opacity="0.1"/>
  <rect x="615" y="335" width="4" height="75" fill="#ffe88a" opacity="0.12"/>
  <!-- Spire reflection -->
  <rect x="398" y="338" width="5" height="90" fill="#d4c060" opacity="0.18"/>

  <!-- Overall dark overlay for depth -->
  <rect width="800" height="500" fill="#000" opacity="0.18"/>
</svg>
