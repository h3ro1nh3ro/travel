<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#0e1820"/>

  <!-- Subtle grid -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#1e3a50" stroke-width="0.8"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#1e3a50" stroke-width="0.8"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#1e3a50" stroke-width="0.8"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1e3a50" stroke-width="0.8"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#1e3a50" stroke-width="0.8"/>

  <!-- Russia outline - bold simplified shape -->
  <path d="
    M 28,165
    C 35,148 48,138 68,128
    C 88,118 112,112 138,108
    C 162,104 188,102 212,98
    C 236,92 258,84 282,80
    C 308,74 335,70 362,66
    C 390,62 418,58 448,54
    C 478,50 508,47 538,44
    C 568,41 598,38 628,36
    C 655,34 678,34 700,38
    C 720,42 736,50 748,62
    C 760,74 768,90 772,108
    C 775,124 774,140 770,156
    C 765,170 756,182 744,192
    C 730,202 714,208 698,210
    C 682,212 666,210 652,206
    C 640,202 630,210 622,222
    C 614,234 608,248 600,260
    C 590,272 578,282 562,288
    C 546,294 528,296 510,294
    C 492,292 474,286 458,282
    C 442,278 426,276 410,280
    C 394,284 380,294 366,304
    C 352,314 338,322 322,328
    C 306,334 288,336 270,334
    C 252,332 234,326 218,322
    C 202,318 186,318 170,324
    C 154,330 140,340 124,350
    C 108,360 90,368 72,372
    C 54,376 36,374 22,364
    C 12,356 6,344 8,330
    C 10,314 18,298 24,282
    C 28,264 30,246 30,228
    C 30,210 29,188 28,165 Z
  " fill="#007a72" opacity="0.9" stroke="#6ecfc7" stroke-width="2"/>

  <!-- Kamchatka -->
  <path d="M 772,108 C 790,95 810,88 828,92 C 846,96 858,110 860,128 C 862,146 852,162 838,170 C 824,178 806,176 792,166 C 778,156 770,140 772,124 Z"
    fill="#007a72" opacity="0.85" stroke="#6ecfc7" stroke-width="1.5"/>

  <!-- Glow on border -->
  <path d="
    M 28,165 C 35,148 48,138 68,128 C 88,118 112,112 138,108
    C 162,104 188,102 212,98 C 236,92 258,84 282,80
    C 308,74 335,70 362,66 C 390,62 418,58 448,54
    C 478,50 508,47 538,44 C 568,41 598,38 628,36
    C 655,34 678,34 700,38 C 720,42 736,50 748,62
  " fill="none" stroke="#6ecfc7" stroke-width="3" opacity="0.5" filter="url(#g)"/>

  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="dot"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Moscow -->
  <circle cx="268" cy="222" r="10" fill="#007a72" stroke="#6ecfc7" stroke-width="2"/>
  <circle cx="268" cy="222" r="4" fill="#6ecfc7" filter="url(#dot)"/>
  <text x="282" y="218" font-family="monospace" font-size="12" fill="#6ecfc7" opacity="0.9" font-weight="bold">Москва</text>

  <!-- SPb -->
  <circle cx="196" cy="170" r="8" fill="#007a72" stroke="#6ecfc7" stroke-width="2"/>
  <circle cx="196" cy="170" r="3" fill="#6ecfc7" filter="url(#dot)"/>
  <text x="208" y="166" font-family="monospace" font-size="11" fill="#6ecfc7" opacity="0.9">СПб</text>

  <!-- Kazan -->
  <circle cx="330" cy="218" r="7" fill="#007a72" stroke="#6ecfc7" stroke-width="1.5"/>
  <circle cx="330" cy="218" r="3" fill="#6ecfc7" filter="url(#dot)"/>

  <!-- Novosibirsk -->
  <circle cx="520" cy="200" r="7" fill="#007a72" stroke="#6ecfc7" stroke-width="1.5"/>
  <circle cx="520" cy="200" r="3" fill="#6ecfc7" filter="url(#dot)"/>

  <!-- Connection lines between cities -->
  <line x1="196" y1="170" x2="268" y2="222" stroke="#6ecfc7" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="268" y1="222" x2="330" y2="218" stroke="#6ecfc7" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="330" y1="218" x2="520" y2="200" stroke="#6ecfc7" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Top-right label -->
  <text x="660" y="40" font-family="monospace" font-size="11" fill="#6ecfc7" opacity="0.4" letter-spacing="3">РОССИЯ</text>

  <!-- Compass -->
  <g transform="translate(750,400)">
    <circle r="18" fill="#0e1820" stroke="#007a72" stroke-width="1.5"/>
    <polygon points="0,-13 2.5,0 0,3 -2.5,0" fill="#6ecfc7"/>
    <polygon points="0,13 2.5,0 0,-3 -2.5,0" fill="#3a5a60"/>
    <text x="-3" y="-16" font-family="monospace" font-size="7" fill="#6ecfc7">N</text>
  </g>

  <!-- Subtle vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig)"/>
</svg>
