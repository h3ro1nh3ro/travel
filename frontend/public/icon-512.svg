<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#111111"/>

  <!-- K: vertical bar + two diagonal arms -->
  <line x1="82" y1="60" x2="82" y2="452"
    stroke="#f0f0f0" stroke-width="64" stroke-linecap="square"/>
  <line x1="82" y1="256" x2="232" y2="60"
    stroke="#f0f0f0" stroke-width="64" stroke-linecap="square"/>
  <line x1="82" y1="256" x2="232" y2="452"
    stroke="#f0f0f0" stroke-width="64" stroke-linecap="square"/>

  <!-- O: rectangular outline (square corners) -->
  <rect x="294" y="88" width="162" height="336"
    stroke="#f0f0f0" stroke-width="64" fill="none"/>
</svg>
